{% extends 'todo/layout.html' %}

{% block content %}
    <h1 class="mb-4">Lista de tareas</h1>

    {% for tarea in tareas %}
        <div class="card mb-2">
            <div class="card-body d-flex justify-content-between align-items-center">
                <span>{{ tarea.tarea }}</span>
                <div>
                    <a href="{% url 'editar' tarea.id %}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="{% url 'eliminar' tarea.id %}" class="btn btn-danger btn-sm">Eliminar</a>
                </div>
            </div>
        </div>
    {% empty %}
        <p>No hay tareas aún.</p>
    {% endfor %}
{% endblock %}
